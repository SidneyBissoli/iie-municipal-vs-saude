# Local pre-commit gates. Mirrors CLAUDE.md §4: CI continues to be the
# source of truth — these hooks just close the loop locally so the
# operator finds out before the push.
#
# Setup once after cloning:
#   uv tool install pre-commit   # or `pipx install pre-commit`
#   pre-commit install           # registers .git/hooks
#
# Hooks reference https://github.com/lorenzwalthert/precommit for the R
# checks. Both pre-commit (Python) and the R `precommit` package are
# installed; the R package is what `precommit::use_precommit()` calls
# under the hood and is kept in renv.lock for reproducibility.

default_install_hook_types: [pre-commit, pre-push]

default_stages: [pre-commit]

repos:
- repo: https://github.com/lorenzwalthert/precommit
  # Dev tag chosen because stable v0.4.3 pins digest 0.6.36, which fails
  # to compile on R 4.5 + Rtools45 (deprecated `Free`/`Calloc` C macros).
  # v0.4.3.9021 ships an updated renv.lock with digest 0.6.39.
  rev: v0.4.3.9021
  hooks:
  - id: style-files
    args: [--style_pkg=styler, --style_fun=tidyverse_style]
    # `style-files` rewrites the staged file. If it changes anything,
    # pre-commit aborts the commit — re-stage and commit again.
    # Restricted to `R/` to match the CI scope
    # (`.github/workflows/R-CMD-check.yaml` → `styler::style_dir("R")`).
    files: '^R/.*\.[rR]$'
  - id: lintr
    # Reads `.lintr` at the repo root. `cyclocomp` is required by the
    # `cyclocomp_linter(complexity_limit = 20L)` setting in `.lintr`;
    # it is not part of the upstream precommit hook env.
    # Restricted to `R/` to match CI scope and to avoid false-positive
    # `object_usage_linter` on `_targets.R` (the hook runs in an
    # isolated renv with no project packages like targets/tarchetypes).
    additional_dependencies: [cyclocomp]
    files: '^R/.*\.[rR]$'
  - id: parsable-R
  - id: no-browser-statement
  - id: no-debug-statement

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: check-added-large-files
    args: ['--maxkb=500']
  - id: trailing-whitespace
    # Skip authored markdown and generated dirs: trailing spaces in
    # markdown can be intentional (e.g., `<br>` via two spaces), and
    # `renv/activate.R` is regenerated by renv.
    exclude: ^(manuscripts/|bibliography/|decisions/|renv/)
  - id: end-of-file-fixer
    exclude: ^(manuscripts/|bibliography/|decisions/|renv/)
  - id: check-yaml
  - id: check-merge-conflict

- repo: local
  hooks:
  - id: testthat
    name: testthat
    description: Run testthat::test_dir before pushing.
    entry: Rscript -e "testthat::test_dir('tests/testthat', reporter='summary', stop_on_failure=TRUE)"
    language: system
    stages: [pre-push]
    pass_filenames: false
