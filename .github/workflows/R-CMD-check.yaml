name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: '4.5.3'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      RENV_CONFIG_REPOS_OVERRIDE: https://packagemanager.posit.co/cran/__linux__/noble/latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2

      - name: Install dev-only tools (not in renv.lock)
        run: Rscript -e 'install.packages(c("lintr", "styler"))'

      - name: Lint R/
        run: Rscript -e 'lintr::lint_dir("R")'

      - name: Style check
        run: |
          Rscript -e 'styler::style_dir("R", dry = "on")'
          Rscript -e 'if (length(system("git diff --name-only", intern = TRUE)) > 0) stop("styler would apply changes; run styler::style_dir(\"R\")")'

      - name: testthat
        run: Rscript -e 'testthat::test_dir("tests/testthat", reporter = "summary", stop_on_failure = TRUE)'
